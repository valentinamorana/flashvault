<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVault — Slideshow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0010;font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh;width:100vw;cursor:none}
.foto-main{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0A0010}
.foto-main img{max-width:100vw;max-height:100vh;object-fit:contain;transition:opacity .8s ease}
.overlay-top{position:fixed;top:0;left:0;right:0;padding:24px 32px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);display:flex;align-items:center;justify-content:space-between;z-index:10}
.logo{font-size:22px;font-weight:700;color:white;letter-spacing:.05em}
.logo span{color:#C9973A}
.event-name{font-size:16px;color:rgba(255,255,255,.7)}
.live-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:6px 14px;font-size:13px;color:white}
.pulse{width:8px;height:8px;background:#4CAF50;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.overlay-bottom{position:fixed;bottom:0;left:0;right:0;padding:24px 32px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);display:flex;align-items:flex-end;justify-content:space-between;z-index:10}
.foto-counter{font-size:14px;color:rgba(255,255,255,.6)}
.foto-counter strong{color:white;font-size:18px}
.notif-nueva{position:fixed;top:80px;right:24px;background:var(--rose,#E8336D);color:white;border-radius:16px;padding:14px 20px;font-size:14px;font-weight:500;z-index:20;display:none;align-items:center;gap:10px;animation:slideIn .4s cubic-bezier(.22,1,.36,1);max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.notif-nueva.show{display:flex}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-nueva img{width:48px;height:48px;object-fit:cover;border-radius:8px}
.thumbs{display:flex;gap:8px;align-items:center}
.thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;border:2px solid transparent;transition:all .3s;cursor:pointer;opacity:.5}
.thumb.active{border-color:white;opacity:1}
.thumb:hover{opacity:.8}
#waiting{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0A0010;color:white;text-align:center;gap:20px;z-index:5}
.logo-big{font-size:48px;font-weight:700;letter-spacing:.05em}
.logo-big span{color:#C9973A}
.waiting-dots{display:flex;gap:10px}
.waiting-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);animation:dotPulse 1.4s ease-in-out infinite}
.waiting-dot:nth-child(1){animation-delay:0s}
.waiting-dot:nth-child(2){animation-delay:.2s}
.waiting-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,100%{background:rgba(255,255,255,.2)}50%{background:rgba(255,255,255,.8)}}
</style>
</head>
<body>

<div id="waiting">
  <div class="logo-big">FlashVault <span>✦</span></div>
  <div id="waiting-event" style="font-size:22px;color:rgba(255,255,255,.7)">Cargando...</div>
  <p style="color:rgba(255,255,255,.5)">Las fotos aparecerán acá en tiempo real</p>
  <div class="waiting-dots"><div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div></div>
  <div style="font-size:13px;color:rgba(255,255,255,.3);margin-top:8px">Pedile a los invitados que escaneen el QR</div>
</div>

<div id="slideshow" style="display:none">
  <div class="overlay-top">
    <div class="logo">FlashVault <span>✦</span></div>
    <div class="event-name" id="ev-name"></div>
    <div class="live-badge"><span class="pulse"></span> En vivo</div>
  </div>
  <div class="foto-main"><img id="foto-actual" src="" alt=""></div>
  <div class="overlay-bottom">
    <div class="foto-counter">Foto <strong id="foto-idx">1</strong> de <strong id="foto-total">0</strong></div>
    <div class="thumbs" id="thumbs"></div>
  </div>
</div>

<div class="notif-nueva" id="notif-nueva">
  <img id="notif-img" src="" alt="">
  <div><div style="font-weight:600;margin-bottom:2px">¡Nueva foto! 📸</div><div style="font-size:12px;opacity:.8">Acaba de subirse</div></div>
</div>

<script src="supabase-config.js"></script>
<script>
let eventoData=null, eventoId=null, fotos=[], indexActual=0, intervalo=null, notifTimeout=null;
const INTERVALO_SEG = 5;

async function init() {
  eventoId = new URLSearchParams(window.location.search).get('evento');
  if (!eventoId) { document.getElementById('waiting-event').textContent = 'Evento no encontrado'; return; }
  const { data } = await db.from('eventos').select('*').eq('id', eventoId).single();
  if (!data) return;
  eventoData = data;
  document.documentElement.style.setProperty('--rose', data.color_primario || '#E8336D');
  document.getElementById('waiting-event').textContent = data.nombre;
  document.getElementById('ev-name').textContent = data.nombre;
  document.title = `Slideshow — ${data.nombre}`;
  await cargarFotos();
  setInterval(cargarFotos, 4000);
}

async function cargarFotos() {
  const { data: nuevasFotos } = await db.from('fotos').select('id,url')
    .eq('evento_id', eventoId).eq('aprobada', true).order('creado_en', { ascending: true });

  if (!nuevasFotos?.length) return;

  const prevLen = fotos.length;
  fotos = nuevasFotos;

  if (prevLen === 0 && fotos.length > 0) {
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('slideshow').style.display = 'block';
    mostrarFoto(0);
    if (fotos.length > 1) arrancarIntervalo();
  } else if (fotos.length > prevLen) {
    mostrarNotificacion(fotos[fotos.length - 1]);
    if (indexActual === prevLen - 1) setTimeout(() => mostrarFoto(fotos.length - 1), 1200);
  }

  actualizarThumbs();
  document.getElementById('foto-total').textContent = fotos.length;
  if (fotos.length > 1 && !intervalo) arrancarIntervalo();
}

function mostrarFoto(idx) {
  if (idx < 0 || idx >= fotos.length) return;
  indexActual = idx;
  const img = document.getElementById('foto-actual');
  img.style.opacity = '0';
  setTimeout(() => { img.src = fotos[idx].url; img.onload = () => img.style.opacity = '1'; }, 400);
  document.getElementById('foto-idx').textContent = idx + 1;
  actualizarThumbs();
}

function arrancarIntervalo() {
  if (intervalo) clearInterval(intervalo);
  intervalo = setInterval(() => mostrarFoto((indexActual + 1) % fotos.length), INTERVALO_SEG * 1000);
}

function actualizarThumbs() {
  const container = document.getElementById('thumbs');
  const ultimas = fotos.slice(-5);
  container.innerHTML = '';
  ultimas.forEach((f, i) => {
    const idx = fotos.length - 5 + i;
    const img = document.createElement('img');
    img.src = f.url; img.className = 'thumb' + (idx === indexActual ? ' active' : '');
    img.onclick = () => { mostrarFoto(idx); clearInterval(intervalo); intervalo = null; setTimeout(arrancarIntervalo, 8000); };
    container.appendChild(img);
  });
}

function mostrarNotificacion(foto) {
  if (notifTimeout) clearTimeout(notifTimeout);
  document.getElementById('notif-img').src = foto.url;
  document.getElementById('notif-nueva').classList.add('show');
  notifTimeout = setTimeout(() => document.getElementById('notif-nueva').classList.remove('show'), 4000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') mostrarFoto((indexActual + 1) % fotos.length);
  if (e.key === 'ArrowLeft')  mostrarFoto((indexActual - 1 + fotos.length) % fotos.length);
  if (e.key === ' ') { if (intervalo) { clearInterval(intervalo); intervalo = null; } else arrancarIntervalo(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) mostrarFoto((indexActual + 1) % fotos.length);
    else mostrarFoto((indexActual - 1 + fotos.length) % fotos.length);
  }
});

init();
</script>
</body>
</html>
