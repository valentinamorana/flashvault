<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVault — Subí tus fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#E8336D;--purple:#6A1B9A;--gold:#C9973A;--cream:#FFF8F0;--dark:#1A1A2E;--muted:#8a6070}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
.shape{position:fixed;border-radius:50%;opacity:.1;animation:float 8s ease-in-out infinite;pointer-events:none}
.s1{width:120px;height:120px;background:var(--rose);top:8%;left:5%}
.s2{width:80px;height:80px;background:var(--gold);top:15%;right:8%;animation-delay:1.5s;border-radius:30% 70% 70% 30%/30% 30% 70% 70%}
.s3{width:60px;height:60px;background:var(--rose);bottom:20%;left:3%;animation-delay:3s;border-radius:20px}
.s4{width:90px;height:90px;background:var(--purple);bottom:10%;right:5%;animation-delay:2s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.card{position:relative;z-index:1;width:100%;max-width:440px;background:white;border-radius:32px;padding:44px 32px 40px;box-shadow:0 0 0 1px rgba(232,51,109,.08),0 24px 64px rgba(26,10,20,.10);animation:cardIn .7s cubic-bezier(.22,1,.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.ribbon{position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;background:white;padding:0 16px}
.rib-line{height:3px;width:56px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:2px}
.header{text-align:center;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FFF0F5,#FFF8E8);border:1px solid rgba(232,51,109,.15);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:500;color:var(--rose);letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px}
.badge::before,.badge::after{content:'✦';font-size:10px;color:var(--gold)}
.title{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;color:var(--dark);line-height:1.05;margin-bottom:6px}
.title em{font-style:italic;color:var(--rose)}
.subtitle{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--muted);margin-bottom:24px}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,51,109,.2),transparent)}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.opt-btn{border:2px dashed rgba(232,51,109,.25);border-radius:20px;padding:24px 12px;text-align:center;cursor:pointer;transition:all .22s ease;background:#FFFAF9;display:flex;flex-direction:column;align-items:center;gap:5px;user-select:none}
.opt-btn:hover,.opt-btn:active{border-color:var(--rose);background:#FFF5F8;transform:scale(1.03)}
.opt-icon{width:54px;height:54px;background:linear-gradient(135deg,#FFE8F0,#FFF0FA);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:4px;box-shadow:0 4px 12px rgba(232,51,109,.12);transition:transform .25s}
.opt-btn:hover .opt-icon{transform:scale(1.12) rotate(-5deg)}
.opt-label{font-size:14px;font-weight:500;color:var(--dark)}
.opt-sub{font-size:11px;color:var(--muted)}
#preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;justify-content:center}
#preview img{width:76px;height:76px;object-fit:cover;border-radius:12px;border:2px solid white;box-shadow:0 4px 12px rgba(0,0,0,.1);animation:thumbIn .3s cubic-bezier(.22,1,.36,1) both}
@keyframes thumbIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--rose),#C4175A);color:white;border:none;border-radius:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;transition:all .25s}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(232,51,109,.35)}
.btn:disabled{background:linear-gradient(135deg,#e8b4c4,#d4a0b0);cursor:default}
.progress-wrap{margin-top:14px;display:none}
.progress-track{width:100%;height:4px;background:#F0E0E8;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--rose),#FF6B9D);border-radius:2px;transition:width .4s ease}
.counter{text-align:center;margin-top:12px;font-size:13px;color:var(--muted)}
.counter strong{color:var(--rose)}
.status{margin-top:14px;font-size:13px;color:var(--muted);text-align:center;min-height:20px}
.status.success{color:#2e7d32;font-weight:500}
.status.error{color:#c62828}
.footer{text-align:center;margin-top:20px;font-size:12px;color:rgba(138,96,112,.5)}
#loading{position:fixed;inset:0;background:rgba(255,248,240,.9);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
#loading p{color:var(--rose);font-size:15px;font-family:'DM Sans',sans-serif}
.spinner{width:40px;height:40px;border:3px solid #FFE0EC;border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="shape s1"></div><div class="shape s2"></div>
<div class="shape s3"></div><div class="shape s4"></div>

<div id="loading"><div class="spinner"></div><p>Cargando el evento...</p></div>

<div class="card" id="main-card" style="display:none">
  <div class="ribbon"><div class="rib-line"></div><span style="color:var(--gold)">✦</span><div class="rib-line"></div></div>
  <div class="header">
    <div class="badge" id="ev-badge">Evento</div>
    <h1 class="title">Fotos para<br><em id="ev-nombre">...</em></h1>
    <p class="subtitle">Compartí tus recuerdos de esta noche</p>
  </div>
  <div class="divider"><div class="div-line"></div><span style="font-size:16px">🌸</span><div class="div-line"></div></div>

  <div class="options">
    <div class="opt-btn" onclick="cameraInput.click()">
      <div class="opt-icon">📷</div>
      <span class="opt-label">Sacar foto</span>
      <span class="opt-sub">Abrí la cámara</span>
    </div>
    <div class="opt-btn" onclick="galleryInput.click()">
      <div class="opt-icon">🖼️</div>
      <span class="opt-label">Galería</span>
      <span class="opt-sub">Elegí existentes</span>
    </div>
  </div>

  <input type="file" id="cameraInput"  accept="image/*" capture="environment" hidden>
  <input type="file" id="galleryInput" accept="image/*" multiple hidden>

  <div id="preview"></div>
  <button class="btn" id="uploadBtn" disabled onclick="subirFotos()">Subir fotos al álbum 💕</button>
  <div class="progress-wrap" id="progressWrap"><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div></div>
  <div class="counter" id="counter" style="display:none"><strong id="foto-count">0</strong> fotos en el álbum — ¡seguí sumando!</div>
  <p class="status" id="status"></p>
  <p class="footer">✦ &nbsp; Las fotos se guardan automáticamente &nbsp; ✦</p>
</div>

<script src="supabase-config.js"></script>
<script>
let eventoData = null, eventoId = null, selectedFiles = [], pollingInterval = null;

async function init() {
  eventoId = new URLSearchParams(window.location.search).get('evento');
  if (!eventoId) { document.getElementById('loading').innerHTML = '<p style="color:red">Evento no encontrado.</p>'; return; }
  const { data, error } = await db.from('eventos').select('*').eq('id', eventoId).eq('activo', true).single();
  if (error || !data) { document.getElementById('loading').innerHTML = '<p style="color:red">Evento no disponible.</p>'; return; }
  eventoData = data;
  aplicarTema();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-card').style.display = 'block';
  iniciarContador();
}

function aplicarTema() {
  document.documentElement.style.setProperty('--rose', eventoData.color_primario);
  document.documentElement.style.setProperty('--purple', eventoData.color_secundario);
  const tipos = { cumpleanos:'🎂 Cumpleaños', casamiento:'💍 Casamiento', corporativo:'🏢 Evento', quince:'🎊 Fiesta de 15', otro:'✨ Evento' };
  document.getElementById('ev-badge').textContent = tipos[eventoData.tipo] || 'Evento';
  document.getElementById('ev-nombre').textContent = eventoData.nombre;
  document.title = `Fotos para ${eventoData.nombre}`;
}

async function iniciarContador() {
  const actualizar = async () => {
    const { count } = await db.from('fotos').select('*', { count: 'exact', head: true }).eq('evento_id', eventoId).eq('aprobada', true);
    if (count > 0) {
      document.getElementById('foto-count').textContent = count;
      document.getElementById('counter').style.display = 'block';
    }
  };
  actualizar();
  pollingInterval = setInterval(actualizar, 8000);
}

document.getElementById('cameraInput').addEventListener('change',  e => manejarArchivos(e.target.files));
document.getElementById('galleryInput').addEventListener('change', e => manejarArchivos(e.target.files));

function manejarArchivos(files) {
  selectedFiles = [...files];
  const preview = document.getElementById('preview');
  preview.innerHTML = '';
  selectedFiles.forEach(f => { const img = document.createElement('img'); img.src = URL.createObjectURL(f); preview.appendChild(img); });
  document.getElementById('uploadBtn').disabled = false;
  setStatus(`${selectedFiles.length} foto(s) lista(s)`);
}

async function subirFotos() {
  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  setStatus('Subiendo...');
  let ok = 0;

  for (let i = 0; i < selectedFiles.length; i++) {
    const file = selectedFiles[i];
    const nombre = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
    const path = `${eventoId}/${nombre}`;

    const { error: storageError } = await db.storage.from('fotos').upload(path, file, { upsert: false });
    if (storageError) { console.error(storageError); continue; }

    const { data: urlData } = db.storage.from('fotos').getPublicUrl(path);

    await db.from('fotos').insert({
      evento_id: eventoId,
      url: urlData.publicUrl,
      nombre,
      aprobada: !eventoData.moderacion,
    });

    ok++;
    document.getElementById('progressFill').style.width = `${((i+1)/selectedFiles.length)*100}%`;
  }

  if (ok === selectedFiles.length) {
    setStatus(`✅ ${ok} foto(s) guardada(s) en el álbum`, 'success');
    document.getElementById('preview').innerHTML = '';
    selectedFiles = [];
    document.getElementById('cameraInput').value = '';
    document.getElementById('galleryInput').value = '';
  } else {
    setStatus('⚠️ Algunas fotos fallaron. Intentá de nuevo.', 'error');
    document.getElementById('uploadBtn').disabled = false;
  }

  setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; document.getElementById('progressFill').style.width = '0'; }, 2000);
}

function setStatus(msg, cls='') {
  const el = document.getElementById('status'); el.textContent = msg; el.className = 'status ' + cls;
}

init();
</script>
</body>
</html>
